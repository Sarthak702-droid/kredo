<!doctype html>
<html lang="en">
  <head>
    <script>
      // Avoid crash on window.fetch override in sandboxed iframe contexts
      (function() {
        try {
          var _fetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return _fetch;
            },
            set: function(val) {
              _fetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Unable to wrap window.fetch getter:', e);
        }
      })();
    </script>
